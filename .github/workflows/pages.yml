name: Pubblica China 2026 su GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Scarica il progetto
        uses: actions/checkout@v4
      - name: Configura Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Configura GitHub Pages
        uses: actions/configure-pages@v5
      - name: Installa dipendenze
        run: npm ci
      - name: Controlla il codice
        run: npm run lint
      - name: Crea il sito statico
        run: npm run build
      - name: Prepara i file da pubblicare
        uses: actions/upload-pages-artifact@v4
        with:
          path: out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Pubblica
        id: deployment
        uses: actions/deploy-pages@v4
